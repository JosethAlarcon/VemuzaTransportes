<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Vemuza Transportes ofrece servicios de transporte para empresas y mudanzas con atencion personalizada, puntualidad y cotizacion rapida."
    />
    <title>Vemuza Transportes | Cotiza tu servicio</title>
  </head>
  <body>
    <form
      name="cotizacion-vemuza"
      data-netlify="true"
      netlify-honeypot="bot-field"
      hidden
    >
      <input type="hidden" name="form-name" value="cotizacion-vemuza" />
      <input type="text" name="nombre" />
      <input type="text" name="empresa" />
      <input type="tel" name="telefono" />
      <input type="email" name="email" />
      <input type="text" name="servicio" />
      <input type="text" name="origen" />
      <input type="text" name="destino" />
      <input type="text" name="cobertura" />
      <input type="text" name="tipoCarga" />
      <input type="date" name="fecha" />
      <textarea name="detalle"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
